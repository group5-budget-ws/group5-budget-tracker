<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Budget Tracker</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>Budget Tracker</h1>

<!-- Type Buttons -->
<div class="type-btns">
  <button id="incomeBtn" class="incomeBtn active" onclick="setType('income')">Income</button>
  <button id="expenseBtn" class="expenseBtn" onclick="setType('expense')">Expense</button>
</div>

<!-- Form -->
<div class="form">
  <input type="number" id="amount" placeholder="Amount">
  <select id="category"></select>
  <input type="text" id="desc" placeholder="Description">
  <input type="date" id="date">
  <button type="button" id="addBtn">Add</button>
</div>

<!-- Cards -->
<div class="cards">
  <div class="card balance">Balance: ₹<span id="balance">0</span></div>
  <div class="card income">Income: ₹<span id="income">0</span></div>
  <div class="card expense">Expense: ₹<span id="expense">0</span></div>
</div>

<!-- Transactions -->
<div class="transactions">
  <h2>Transactions</h2>
  <div id="list"></div>
</div>

<!-- Chart -->
<div class="chart-container">
  <h2>Expense Breakdown</h2>
  <canvas id="chart"></canvas>
</div>

<!-- Monthly Summary -->
<div id="monthlyList"></div>

<!-- JS -->
<script src="js/script.js"></script>

</body>
</html>
